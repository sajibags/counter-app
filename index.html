<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trending Button</title>
    <link rel="stylesheet" href="./style.css" />
    <script defer src="./main.js"></script>
  </head>
  <body>
    <div class="main-container">
      <h1 id="main-heading">This is a counter fucking App!</h1>
      <p id="count">0</p>
      <div class="buttons">
        <button onclick="increment()" id="i-btn">Increment ++</button>
        <button onclick="decrement()" id="d-btn">Decrement --</button>
      </div>
      <button onclick="save_result()" id="save-button">Save</button>
      <button onclick="reset()" id="reset-btn">Reset</button>
      <p id="result-output">This is the result:</p>
    </div>
  </body>
</html>
